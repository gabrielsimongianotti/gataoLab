name: "STAGING DEPLOY"

on:
    push:
        branches:
            - staging

permissions:
    id-token: write
    contents: read

jobs:
    terraform:
        uses: ./.github/workflows/infra.yml
        secrets: inherit
        with:
            environment: staging
            aws-region: "us-east-1"
            aws-statefile-s3-bucket: "lambda-deploy-pipeline-gatao"
            aws-lock-dynamodb-table: "github-actions-gabrielsimongianotti-pipeline"
